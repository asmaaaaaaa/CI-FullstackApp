name: ci-fullstack-workflow

# Ensure the workflow runs on schedule (Sunday at 0:00) and on push to the main branch
on:
  # Automatic trigger on push events to the main branch
  push:
    branches:
      - main

  # Scheduled trigger every Sunday at midnight (0.00)
  schedule:
    - cron: '0 0 * * 0'

#Use a matrix strategy to use Node.js versions 16.x and 18.x
jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x, 18.x]

    steps:
      # Check out the code from the repository.
      - name: Check out repository
        uses: actions/checkout@v4

      # Set up a Node.js environment using the specified node version.
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      # Install the dependencies.
      - name: Install Dependencies
        run: npm install


      # Run the tests.
      - name: Test
        run: npm run test


      # Run the linter.
      - name: Run Linting
        run: npm run lint

      # Send a console message at completion.
      - run: |
          echo "Hello ${{ github.actor }}. You pushed to ${{ github.repository }} at $(date)."

        
